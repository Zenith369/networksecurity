# supervisord.conf
# Configuration file for Supervisor process manager

[supervisord]
nodaemon=true # Important: Runs supervisor in the foreground, required for Docker

[program:fastapi]
# Command to start the FastAPI backend using Gunicorn for production
# Make sure your main python file is app.py and the FastAPI instance is named 'app'
command=gunicorn app:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
directory=/app
autostart=true
autorestart=true
# Send logs to stdout/stderr to be picked up by 'docker logs'
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:streamlit]
# Command to start the Streamlit frontend
# The --server.headless flag is crucial for running in a container
command=streamlit run frontend.py --server.port 8501 --server.headless true --server.enableCORS false
directory=/app
autostart=true
autorestart=true
# Send logs to stdout/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0